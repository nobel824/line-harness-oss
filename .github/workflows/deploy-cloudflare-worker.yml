name: Deploy Cloudflare Worker

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/worker/**'
      - 'apps/liff/**'
      - 'packages/db/**'
      - 'packages/shared/**'
      - 'packages/line-sdk/**'
      - '.github/workflows/deploy-cloudflare-worker.yml'

jobs:
  deploy:
    if: github.repository != 'Shudesu/line-harness-oss' && vars.LINE_HARNESS_CLOUDFLARE_DEPLOY == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      # worker は @line-harness/update-engine (main=dist/index.cjs) にも依存する。
      # これを抜くと vite build が "Failed to resolve entry" で落ちる。
      - run: pnpm --filter @line-crm/shared --filter @line-crm/line-sdk --filter @line-crm/db --filter @line-harness/update-engine build

      - name: Baseline _migrations for bootstrap-installed DBs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          D1_DATABASE_NAME: ${{ secrets.D1_DATABASE_NAME }}
        run: |
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$D1_DATABASE_NAME"

          npx wrangler d1 execute "$D1_DATABASE_NAME" --remote --command \
            "CREATE TABLE IF NOT EXISTS _migrations (name TEXT PRIMARY KEY, applied_at TEXT NOT NULL)"

          # setup が bootstrap.sql で一括構築した DB は全テーブル/カラムが揃って
          # いるのに _migrations が空。その状態で次ステップが 001 から再適用すると
          # "duplicate column" で失敗する。_migrations が空のときだけ、bootstrap.sql
          # に焼き込み済みの migration 名 (bootstrap-meta.json) を applied として登録し
          # baseline する。既に行があれば (= 既に migration 追跡済みの DB) 何もしない。
          count=$(npx wrangler d1 execute "$D1_DATABASE_NAME" --remote \
            --command "SELECT COUNT(*) AS c FROM _migrations" --json \
            | node -e 'const d=JSON.parse(require("fs").readFileSync(0,"utf8"));const r=d[0]&&d[0].results&&d[0].results[0];console.log(r?r.c:0)')
          if [ "$count" = "0" ]; then
            echo "Empty _migrations -> baseline from bootstrap-meta.json"
            vals=$(node -e 'const m=require("./packages/db/bootstrap-meta.json").includedMigrations;process.stdout.write(m.map(n=>"(\x27"+n+"\x27,\x27bootstrap\x27)").join(","))')
            npx wrangler d1 execute "$D1_DATABASE_NAME" --remote \
              --command "INSERT OR IGNORE INTO _migrations (name, applied_at) VALUES ${vals}"
          else
            echo "_migrations already has ${count} rows -> skip baseline"
          fi

      - name: Run pending D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          D1_DATABASE_NAME: ${{ secrets.D1_DATABASE_NAME }}
        run: |
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$D1_DATABASE_NAME"

          npx wrangler d1 execute "$D1_DATABASE_NAME" --remote --command \
            "CREATE TABLE IF NOT EXISTS _migrations (name TEXT PRIMARY KEY, applied_at TEXT NOT NULL)"

          for f in $(ls packages/db/migrations/*.sql | sort); do
            name=$(basename "$f")
            applied=$(npx wrangler d1 execute "$D1_DATABASE_NAME" --remote \
              --command "SELECT name FROM _migrations WHERE name = '${name}'" --json \
              | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));console.log(d[0]?.results?.length||0)")
            if [ "$applied" = "0" ]; then
              echo "Applying: $name"
              npx wrangler d1 execute "$D1_DATABASE_NAME" --remote --file="$f"
              npx wrangler d1 execute "$D1_DATABASE_NAME" --remote --command \
                "INSERT INTO _migrations (name, applied_at) VALUES ('${name}', datetime('now'))"
            else
              echo "Skipped: $name"
            fi
          done

      - name: Build Worker and LIFF assets
        run: pnpm --filter worker build
        env:
          VITE_LIFF_ID: ${{ vars.VITE_LIFF_ID }}
          VITE_BOT_BASIC_ID: ${{ vars.VITE_BOT_BASIC_ID }}
          VITE_CALENDAR_CONNECTION_ID: ${{ vars.VITE_CALENDAR_CONNECTION_ID }}

      - name: Patch wrangler config
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          D1_DATABASE_NAME: ${{ secrets.D1_DATABASE_NAME }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          WORKER_NAME: ${{ vars.WORKER_NAME || 'your-worker-name' }}
        run: |
          test -n "$D1_DATABASE_ID"
          cd apps/worker
          sed -i \
            -e "s|\"account_id\":\"[^\"]*\"|\"account_id\":\"${CLOUDFLARE_ACCOUNT_ID}\"|g" \
            -e "s|\"database_name\":\"[^\"]*\"|\"database_name\":\"${D1_DATABASE_NAME}\"|g" \
            -e "s|\"database_id\":\"[^\"]*\"|\"database_id\":\"${D1_DATABASE_ID}\"|g" \
            dist/line_harness/wrangler.json

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/worker
          command: deploy --config dist/line_harness/wrangler.json --name ${{ vars.WORKER_NAME || 'your-worker-name' }}
